<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<title>Animated Red Gradient</title>

<style>
    body {
        margin: 0;
        background: black;
        overflow: hidden;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .container {
        width: 1920px;
        height: 1080px;
        position: relative;
    }

    .rectangle {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 1400px;
        height: 200px;
        overflow: hidden;

        /* plynulá zmena výšky */
        transition: height 1.5s ease-in-out;
    }

    .gradient {
        width: 100%;
        height: 300%;
        position: absolute;
        top: -100%;
        background: linear-gradient(
            to bottom,
            rgba(139, 0, 0, 1) 0%,
            rgba(139, 0, 0, 0.8) 30%,
            rgba(0, 0, 0, 0.3) 70%,
            rgba(0, 0, 0, 0) 100%
        );
        transition: transform 1s ease-in-out;
    }
</style>
</head>

<body>

<div class="container">
    <div class="rectangle" id="rectangle">
        <div class="gradient" id="gradient"></div>
    </div>
</div>

<script>
    const gradient = document.getElementById("gradient");
    const rectangle = document.getElementById("rectangle");

    const baseHeight = 200;

    function animateGradient() {
        const randomY = (Math.random() * 80) - 40;
        gradient.style.transform = `translateY(${randomY}px)`;

        const nextMove = Math.random() * 1500 + 500;
        setTimeout(animateGradient, nextMove);
    }

    function animateHeight() {
        // 10% – 30% z 200px
        const changePercent = Math.random() * 0.2 + 0.1;
        const direction = Math.random() > 0.5 ? 1 : -1;

        const newHeight = baseHeight * (1 + (changePercent * direction));

        rectangle.style.height = `${newHeight}px`;

        const nextResize = Math.random() * (300000 - 30000) + 30000;
        setTimeout(animateHeight, nextResize);
    }

    animateGradient();
    animateHeight();
</script>

</body>
</html>
